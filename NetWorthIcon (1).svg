<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c3a1c"/>
      <stop offset="100%" stop-color="#0e1f0e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0d264"/>
      <stop offset="50%" stop-color="#c49a20"/>
      <stop offset="100%" stop-color="#a07010"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="1024" height="1024" rx="230" ry="230"/>
    </clipPath>
  </defs>

  <g clip-path="url(#round)">
    <!-- Background -->
    <rect width="1024" height="1024" fill="url(#bg)"/>

    <!-- Subtle vignette -->
    <radialGradient id="vig" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.35)"/>
    </radialGradient>
    <rect width="1024" height="1024" fill="url(#vig)"/>

    <!-- The N — bold, centered, golden -->
    <text
      x="512"
      y="680"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="660"
      font-weight="700"
      fill="url(#gold)"
      text-anchor="middle"
      dominant-baseline="auto"
      letter-spacing="-20"
    >N</text>
  </g>
</svg>
