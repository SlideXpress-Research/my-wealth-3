<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient: deep forest -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e2010"/>
      <stop offset="55%" stop-color="#14261a"/>
      <stop offset="100%" stop-color="#1b3822"/>
    </linearGradient>

    <!-- Gold gradient for main accent -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d264"/>
      <stop offset="50%" stop-color="#c49a20"/>
      <stop offset="100%" stop-color="#a07010"/>
    </linearGradient>

    <!-- Gold shimmer for top bar lines -->
    <linearGradient id="goldH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c49a20" stop-opacity="0"/>
      <stop offset="30%" stop-color="#f0d264"/>
      <stop offset="70%" stop-color="#c49a20"/>
      <stop offset="100%" stop-color="#c49a20" stop-opacity="0"/>
    </linearGradient>

    <!-- Green glow for chart arc -->
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a7a3a"/>
      <stop offset="100%" stop-color="#244d2a"/>
    </linearGradient>

    <!-- Atmospheric glow -->
    <radialGradient id="glowTop" cx="75%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#c49a20" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#c49a20" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBot" cx="20%" cy="85%" r="45%">
      <stop offset="0%" stop-color="#2d5c2a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2d5c2a" stop-opacity="0"/>
    </radialGradient>

    <!-- Inner glow on coin -->
    <radialGradient id="coinGlow" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#f0d264" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#a07010" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="rgba(255,255,255,0.018)" stroke-width="1"/>
    </pattern>

    <!-- Clip for rounded rect icon shape -->
    <clipPath id="iconClip">
      <rect width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>

    <!-- Drop shadow filter for elements -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="glowFilter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <g clip-path="url(#iconClip)">
    <!-- Base background -->
    <rect width="1024" height="1024" fill="url(#bg)"/>

    <!-- Grid texture -->
    <rect width="1024" height="1024" fill="url(#grid)"/>

    <!-- Atmospheric glows -->
    <rect width="1024" height="1024" fill="url(#glowTop)"/>
    <rect width="1024" height="1024" fill="url(#glowBot)"/>

    <!-- ── DECORATIVE RING (background) ── -->
    <circle cx="512" cy="512" r="340" fill="none" stroke="rgba(196,154,32,0.07)" stroke-width="60"/>
    <circle cx="512" cy="512" r="260" fill="none" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>

    <!-- ── DONUT CHART ARC — main visual element ── -->
    <!-- Background ring -->
    <circle cx="512" cy="430" r="195" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="42"/>

    <!-- Green arc — 77% of circle = ~277 degrees -->
    <!-- stroke-dasharray: circumference = 2π×195 ≈ 1225. 77% = 943 -->
    <circle cx="512" cy="430" r="195"
      fill="none"
      stroke="url(#arcGrad)"
      stroke-width="42"
      stroke-linecap="round"
      stroke-dasharray="943 1225"
      stroke-dashoffset="306"
      transform="rotate(-90 512 430)"
      filter="url(#softShadow)"
    />

    <!-- Gold arc — 23% of circle ≈ 282 -->
    <circle cx="512" cy="430" r="195"
      fill="none"
      stroke="url(#gold)"
      stroke-width="42"
      stroke-linecap="round"
      stroke-dasharray="282 1225"
      stroke-dashoffset="-637"
      transform="rotate(-90 512 430)"
      filter="url(#softShadow)"
    />

    <!-- Donut centre fill -->
    <circle cx="512" cy="430" r="170" fill="url(#bg)"/>
    <circle cx="512" cy="430" r="170" fill="rgba(255,255,255,0.025)"/>

    <!-- ── CENTRE: NW symbol ── -->
    <!-- Letter N -->
    <text x="447" y="408"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="110" font-weight="400"
      fill="rgba(255,255,255,0.92)"
      letter-spacing="-4"
      text-anchor="middle">N</text>
    <!-- Letter W -->
    <text x="577" y="408"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="110" font-weight="400"
      fill="rgba(255,255,255,0.92)"
      letter-spacing="-4"
      text-anchor="middle">W</text>

    <!-- Gold underline accent below NW -->
    <rect x="452" y="422" width="120" height="3" rx="2" fill="url(#goldH)"/>

    <!-- Tiny label -->
    <text x="512" y="458"
      font-family="'Arial Narrow', Arial, sans-serif"
      font-size="28" font-weight="700"
      fill="rgba(196,154,32,0.75)"
      letter-spacing="8"
      text-anchor="middle">WEALTH</text>

    <!-- ── BAR CHART at bottom ── -->
    <!-- Three bars representing asset allocation -->
    <!-- Bar backgrounds -->
    <rect x="302" y="680" width="58" height="130" rx="8" fill="rgba(255,255,255,0.07)"/>
    <rect x="388" y="680" width="58" height="130" rx="8" fill="rgba(255,255,255,0.07)"/>
    <rect x="474" y="680" width="58" height="130" rx="8" fill="rgba(255,255,255,0.07)"/>
    <rect x="560" y="680" width="58" height="130" rx="8" fill="rgba(255,255,255,0.07)"/>
    <rect x="646" y="680" width="58" height="130" rx="8" fill="rgba(255,255,255,0.07)"/>

    <!-- Bar fills — different heights -->
    <rect x="302" y="744" width="58" height="66" rx="6" fill="#c49a20" opacity="0.9"/>
    <rect x="388" y="700" width="58" height="110" rx="6" fill="url(#arcGrad)" opacity="0.95"/>
    <rect x="474" y="724" width="58" height="86" rx="6" fill="#3a7a3a" opacity="0.8"/>
    <rect x="560" y="708" width="58" height="102" rx="6" fill="#c49a20" opacity="0.65"/>
    <rect x="646" y="756" width="58" height="54" rx="6" fill="url(#arcGrad)" opacity="0.7"/>

    <!-- Gold sparkle dots above tallest bar -->
    <circle cx="417" cy="690" r="4" fill="url(#gold)" opacity="0.9"/>
    <circle cx="503" cy="714" r="3" fill="rgba(196,154,32,0.7)"/>

    <!-- Baseline -->
    <rect x="285" y="812" width="440" height="2" rx="1" fill="rgba(255,255,255,0.12)"/>

    <!-- ── BOTTOM LABEL ── -->
    <text x="512" y="884"
      font-family="'Arial Narrow', Arial, sans-serif"
      font-size="38" font-weight="700"
      fill="rgba(205,228,205,0.55)"
      letter-spacing="10"
      text-anchor="middle">DASHBOARD</text>

    <!-- ── TOP GOLD LINE ── -->
    <rect x="0" y="0" width="1024" height="3" fill="url(#goldH)" opacity="0.7"/>

    <!-- ── CORNER ORNAMENTS ── -->
    <!-- Top-left -->
    <path d="M 80 80 L 80 140 M 80 80 L 140 80" fill="none" stroke="url(#gold)" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <!-- Top-right -->
    <path d="M 944 80 L 944 140 M 944 80 L 884 80" fill="none" stroke="url(#gold)" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <!-- Bottom-left -->
    <path d="M 80 944 L 80 884 M 80 944 L 140 944" fill="none" stroke="url(#gold)" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <!-- Bottom-right -->
    <path d="M 944 944 L 944 884 M 944 944 L 884 944" fill="none" stroke="url(#gold)" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>
