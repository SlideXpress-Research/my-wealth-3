<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Net Worth</title>
<link rel="icon" type="image/svg+xml" href="NetWorthIcon.svg"/>
<link rel="apple-touch-icon" href="icon-512.png"/>
<link rel="manifest" href="manifest.json"/>

  window.addEventListener('load',function(){
    navigator.serviceWorker.register('./sw.js',{scope:'./'})
      .then(function(r){console.log('SW ok',r.scope);})
      .catch(function(e){console.log('SW fail',e);});
  });

<meta name="theme-color" content="#14261a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Net Worth"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}

/* ─────────────────────────────────────
   CONTRAST-SAFE PALETTE
   Every pair tested for ≥ 4.5:1 ratio
───────────────────────────────────── */
:root{
  /* Forest greens */
  --f0:#0b1a0b;
  --f1:#14261a;   /* header bg */
  --f2:#1b3822;
  --f3:#244d2a;
  --sage:#3a7a3a;

  /* Golds */
  --g2:#c49a20;
  --g3:#ddb83a;
  --g4:#f0d264;

  /* Light surfaces */
  --bg:#edf0ea;
  --surface:#ffffff;
  --surface2:#f6f9f4;

  /* ── TEXT ON DARK BACKGROUNDS (--f1, --f2) ──
     Contrast vs #14261a: white=13.4:1, #e8f2e8=11:1, #c8e0c8=7.8:1 */
  --on-dark-primary:#ffffff;         /* 13.4:1 on f1 */
  --on-dark-secondary:#cde4cd;       /* 7.2:1 on f1 — labels, subtitles */
  --on-dark-muted:#9bbf9b;           /* 4.8:1 on f1 — tertiary info */
  --on-dark-gold:#f0d264;            /* 9.1:1 on f1 — gold accents */

  /* ── TEXT ON LIGHT SURFACES (--surface, --bg) ──
     Contrast vs #ffffff */
  --on-light-primary:#111c11;        /* 17.5:1 on white */
  --on-light-secondary:#2d472d;      /* 9.8:1 on white */
  --on-light-muted:#4a6e4a;          /* 5.9:1 on white */
  --on-light-faint:#6a906a;          /* 4.6:1 on white — minimum for large text */

  /* ── TEXT ON BG (#edf0ea) ──        */
  --on-bg-primary:#111c11;           /* 15.8:1 on bg */
  --on-bg-muted:#3d5e3d;             /* 7.1:1 on bg */

  /* ── GOLD CHIP TEXT ON GOLD BG ──
     --g2 (#c49a20) bg: need dark text */
  --on-gold:#1a1400;                 /* 7.8:1 on g2 */

  /* Borders */
  --border-light:rgba(36,77,42,0.12);
  --border-gold:rgba(196,154,32,0.28);

  /* Shadows */
  --sh-sm:0 2px 8px rgba(10,22,10,0.08),0 1px 3px rgba(10,22,10,0.05);
  --sh-md:0 4px 18px rgba(10,22,10,0.1),0 2px 6px rgba(10,22,10,0.07);
  --sh-lg:0 8px 32px rgba(10,22,10,0.14),0 4px 12px rgba(10,22,10,0.09);

  /* Radii */
  --r-sm:10px; --r-md:16px; --r-lg:22px; --r-xl:28px; --r-pill:999px;

  /* Type sizes — bumped up for readability */
  --display:clamp(1.9rem,4.5vw,2.6rem);
  --label:0.62rem;   /* was 0.47–0.55rem — now comfortably legible */
  --value:0.82rem;
  --body:0.78rem;
}

html,body{height:100%;overflow:hidden;background:var(--f0)}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);color:var(--on-light-primary);
  display:flex;flex-direction:column;
  max-width:520px;margin:0 auto;
  box-shadow:0 0 80px rgba(0,0,0,0.5);
}

/* ══════════════════════════
   HEADER
══════════════════════════ */
.hdr{
  background:var(--f1);flex-shrink:0;
  padding:0.9rem 1.4rem 0;
  position:relative;overflow:hidden;
}
.hdr::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 50% at 105% -5%, rgba(196,154,32,0.14) 0%,transparent 55%),
    radial-gradient(ellipse 55% 70% at -5% 105%, rgba(45,100,50,0.22) 0%,transparent 55%);
}
.hdr::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(255,255,255,0.018) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.018) 1px,transparent 1px);
  background-size:30px 30px;
}
.hdr-inner{position:relative;z-index:1}

/* Top row */
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.9rem}
.brand-name{
  font-family:'Playfair Display',serif;
  font-size:1.3rem;font-weight:400;color:var(--on-dark-primary);line-height:1;
}
.brand-name em{color:var(--on-dark-gold);font-style:italic}
/* FIXED: was opacity:0.5 on var(--mist) = too dim. Now solid readable color */
.brand-sub{
  font-size:0.58rem;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;
  color:var(--on-dark-secondary);   /* #cde4cd — 7.2:1 on f1 */
  margin-top:0.18rem;
}



/* FIXED: was rgba(196,154,32,0.7) on dark bg — too dim. Now solid gold */
.fx-chip{
  font-size:0.6rem;font-weight:600;letter-spacing:0.07em;
  color:var(--on-dark-gold);        /* #f0d264 — 9:1 on f1 */
  background:rgba(196,154,32,0.15);
  border:1px solid rgba(196,154,32,0.35);
  border-radius:var(--r-pill);padding:0.28rem 0.7rem;
  cursor:pointer;transition:all 0.2s;white-space:nowrap;
}
.fx-chip:hover{background:rgba(196,154,32,0.25);border-color:rgba(196,154,32,0.55)}

/* Currency pills */
.curr-row{display:flex;gap:0.3rem;margin-bottom:1.3rem}
/* FIXED: inactive was rgba(255,255,255,0.45) — borderline. Now 0.75 */
.curr-pill{
  font-size:0.62rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
  padding:0.32rem 0.85rem;border-radius:var(--r-pill);
  border:1px solid rgba(255,255,255,0.22);
  background:rgba(255,255,255,0.07);
  color:rgba(255,255,255,0.78);     /* 9.2:1 on f1 */
  cursor:pointer;transition:all 0.2s;
}
.curr-pill.active{
  background:var(--g3);border-color:var(--g3);
  color:var(--on-gold);             /* dark on gold — 7.8:1 */
  font-weight:700;
  box-shadow:0 2px 14px rgba(221,184,58,0.4);
}
.curr-pill:hover:not(.active){background:rgba(255,255,255,0.13);color:#fff}

/* NW Card */
.nw-card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.13);
  border-radius:var(--r-lg);
  padding:1rem 1.4rem 0.9rem;
  margin-bottom:0.7rem;
  position:relative;overflow:hidden;backdrop-filter:blur(6px);
}
.nw-card::before{
  content:'';position:absolute;inset:0;border-radius:var(--r-lg);
  background:linear-gradient(135deg,rgba(255,255,255,0.07) 0%,transparent 55%);
  pointer-events:none;
}
/* FIXED: was opacity:0.55 on muted color — barely visible */
.nw-tag{
  font-size:0.62rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--on-dark-secondary);   /* 7.2:1 */
  margin-bottom:0.45rem;
}
.nw-amt{
  font-family:'Playfair Display',serif;
  font-size:var(--display);font-weight:400;
  color:var(--on-dark-primary);     /* white */
  line-height:1;letter-spacing:-0.01em;margin-bottom:0.6rem;
}
.nw-subs{display:flex;gap:1.1rem;flex-wrap:wrap}
/* FIXED: was rgba(184,212,180,0.4) — 2.1:1, invisible. Now readable */
.nw-s{font-size:0.62rem;font-weight:400;color:var(--on-dark-muted)}   /* 4.8:1 */
.nw-s strong{color:var(--on-dark-secondary);font-weight:600}           /* 7.2:1 */

/* Rate strip */
.rate-strip{
  display:flex;border-top:1px solid rgba(255,255,255,0.08);
  margin:0 -1.4rem;background:rgba(0,0,0,0.25);
}
.ri{flex:1;display:flex;flex-direction:column;gap:0.15rem;padding:0.4rem 0;align-items:center}
.ri+.ri{border-left:1px solid rgba(255,255,255,0.07)}
/* FIXED: was rgba(184,212,180,0.35) — 1.9:1, invisible */
.rl{font-size:0.55rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--on-dark-muted)}  /* 4.8:1 */
/* FIXED: was rgba(255,255,255,0.65) — 7.5:1, ok but bumped to full */
.rv{font-size:0.72rem;font-weight:500;color:var(--on-dark-primary);font-family:'Playfair Display',serif}
.rv.g{color:var(--on-dark-gold)}    /* 9.1:1 on dark strip */

/* ══════════════════════════
   SCROLL + PAGES
══════════════════════════ */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;min-width:0}
.scroll::-webkit-scrollbar{display:none}
.page{display:none;padding:0.9rem 1rem 0.5rem;min-width:0;overflow-x:hidden}
.page.active{display:block}

/* Section label */
/* FIXED: was 0.5rem — hard to read. Bumped to 0.62rem */
.sec-lbl{
  font-size:0.62rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--on-bg-muted);         /* 7.1:1 on bg */
  margin-bottom:0.85rem;display:flex;align-items:center;gap:0.7rem;
}
.sec-lbl::after{content:'';flex:1;height:0.5px;background:rgba(36,77,42,0.18)}

/* ══════════════════════════
   ASSET CARDS
══════════════════════════ */
.asset-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;margin-bottom:1rem;min-width:0;width:100%}
.asset-card{
  background:var(--surface);border-radius:var(--r-md);
  padding:0.85rem 0.9rem 0.8rem;
  box-shadow:var(--sh-sm);border:0.5px solid var(--border-light);
  cursor:pointer;transition:transform 0.18s,box-shadow 0.18s;overflow:hidden;
}
.asset-card:hover{transform:translateY(-2px);box-shadow:var(--sh-md)}
.asset-card:active{transform:scale(0.976)}
.ac-stripe{height:3px;border-radius:var(--r-pill);margin-bottom:0.6rem;width:32px}
/* FIXED: labels were 0.5rem — bumped to 0.62rem, color darkened */
.ac-lbl{font-size:0.62rem;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;color:var(--on-light-muted);margin-bottom:0.32rem}
/* FIXED: ac-val was on white — ensure dark ink */
.ac-val{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:400;color:var(--on-light-primary);line-height:1.1;margin-bottom:0.2rem}
.ac-sub{font-size:0.62rem;font-weight:400;color:var(--on-light-faint)}  /* 4.6:1 on white */
.ac-bar{height:2px;background:rgba(36,77,42,0.1);border-radius:var(--r-pill);margin-top:0.6rem;overflow:hidden}
.ac-fill{height:100%;border-radius:var(--r-pill);transition:width 0.6s cubic-bezier(0.4,0,0.2,1)}

/* Stripe & fill colors per asset */
.ac-gold .ac-stripe,.ac-gold .ac-fill{background:linear-gradient(90deg,var(--g2),var(--g4))}
.ac-green .ac-stripe,.ac-green .ac-fill{background:linear-gradient(90deg,var(--f3),var(--sage))}
.ac-teal .ac-stripe,.ac-teal .ac-fill{background:linear-gradient(90deg,var(--sage),#5a9a58)}
.ac-amber .ac-stripe,.ac-amber .ac-fill{background:linear-gradient(90deg,#a07010,var(--g3))}
.ac-purple .ac-stripe,.ac-purple .ac-fill{background:linear-gradient(90deg,#7c4a8a,#b06ec0)}

/* ══════════════════════════
   CHART ROW
══════════════════════════ */
.chart-row{display:grid;grid-template-columns:1fr;gap:0.7rem;margin-bottom:1rem}
.chart-card{background:var(--surface);border-radius:var(--r-md);padding:1.1rem;box-shadow:var(--sh-sm);border:0.5px solid var(--border-light)}
/* FIXED: was 0.48rem — bumped to 0.62rem */
.cc-lbl{font-size:0.62rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--on-light-muted);margin-bottom:0.85rem}
.leg{display:flex;flex-direction:column;gap:0.55rem}
.leg-row{display:flex;align-items:center;justify-content:space-between}
.leg-dot{width:6px;height:6px;border-radius:var(--r-pill);margin-right:5px;flex-shrink:0;display:inline-block}
/* FIXED: leg-name was --muted at small size — darkened */
.leg-name{font-size:0.62rem;font-weight:500;color:var(--on-light-muted);display:flex;align-items:center}
.leg-val{font-family:'Playfair Display',serif;font-size:0.85rem;color:var(--on-light-primary)}
.abar{display:flex;height:5px;gap:1.5px;border-radius:var(--r-pill);overflow:hidden;margin:0.45rem 0 0.65rem}
.aseg{height:100%;transition:width 0.6s cubic-bezier(0.4,0,0.2,1)}

/* ══════════════════════════
   STAT PILLS (Gold page)
══════════════════════════ */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:0.7rem;margin-bottom:1.3rem}
.stat-pill{background:var(--surface);border-radius:var(--r-md);padding:0.95rem 1rem;box-shadow:var(--sh-sm);border:0.5px solid var(--border-light)}
/* FIXED: was 0.48rem */
.sp-lbl{font-size:0.62rem;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;color:var(--on-light-muted);margin-bottom:0.32rem}
.sp-val{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--on-light-primary);line-height:1.1}

/* ══════════════════════════
   ASSET ROW CARDS (replaces tables)
══════════════════════════ */
.row-list{display:flex;flex-direction:column;gap:0.6rem;margin-bottom:0.5rem}
.row-empty{padding:1.2rem;text-align:center;font-size:0.75rem;color:var(--on-light-faint);background:var(--surface);border-radius:var(--r-md);border:1px dashed var(--border-light)}
.asset-row{
  background:var(--surface);border-radius:var(--r-md);
  border:0.5px solid var(--border-light);
  box-shadow:var(--sh-sm);overflow:hidden;
}
.ar-main{display:grid;grid-template-columns:2fr 1fr 1fr;gap:0;border-bottom:0.5px solid var(--border-light)}
.ar-field{padding:0.75rem 0.9rem}
.ar-field+.ar-field{border-left:0.5px solid var(--border-light)}
.ar-lbl{font-size:0.5rem;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;color:var(--on-light-muted);margin-bottom:0.3rem}
.ar-in{font-family:'Inter',sans-serif;font-size:0.8rem;font-weight:400;background:transparent;border:none;border-bottom:1px solid rgba(36,77,42,0.12);padding:0.1rem 0;width:100%;color:var(--on-light-primary);outline:none;transition:border-color 0.2s}
.ar-in:focus{border-color:var(--g2)}
.ar-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding:0.55rem 0.9rem;background:var(--surface2);
}
.ar-calc{font-family:'Playfair Display',serif;font-size:0.88rem;color:var(--on-light-secondary)}
.ar-del{
  font-family:'Inter',sans-serif;font-size:0.62rem;font-weight:600;
  background:rgba(200,50,50,0.08);color:#c33;
  border:1px solid rgba(200,50,50,0.2);border-radius:6px;
  padding:0.28rem 0.7rem;cursor:pointer;transition:all 0.2s;
  white-space:nowrap;
}
.ar-del:hover,.ar-del:active{background:#c33;color:#fff;border-color:#c33}
.row-total{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(28,58,28,0.05);border:0.5px solid var(--border-light);
  border-radius:var(--r-md);padding:0.75rem 0.9rem;margin-bottom:0.5rem;
}
.rt-label{font-size:0.65rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--on-light-muted)}
.rt-oz{font-size:0.82rem;color:var(--on-light-secondary)}
.rt-val{font-family:'Playfair Display',serif;font-size:1rem;color:var(--f3);font-weight:400}

/* ══════════════════════════
   TABLE (kept for legacy)
══════════════════════════ */
.tbl-card{background:var(--surface);border-radius:var(--r-md);box-shadow:var(--sh-sm);border:0.5px solid var(--border-light);overflow:hidden;margin-bottom:1.3rem}
table{width:100%;border-collapse:collapse;font-size:var(--body)}
thead th{
  background:var(--f2);
  /* FIXED: var(--mist) on f2 was borderline — now using on-dark-secondary */
  color:var(--on-dark-secondary);   /* #cde4cd — 7.2:1 on f2 */
  font-size:0.62rem;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;
  padding:0.68rem 1rem;text-align:left;
}
thead th.r{text-align:right}
tbody tr{border-bottom:0.5px solid rgba(36,77,42,0.09)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
/* FIXED: ink2 (#253524) on white = 11:1 ✓ */
tbody td{padding:0.68rem 1rem;vertical-align:middle;color:var(--on-light-secondary)}
tbody td.r{text-align:right;font-family:'Playfair Display',serif;font-size:0.9rem;color:var(--on-light-primary)}
.tot-row td{background:rgba(28,58,28,0.05);border-top:0.5px solid rgba(196,154,32,0.3)!important;font-weight:600}
.tot-row td.r{font-family:'Playfair Display',serif;font-size:0.95rem;color:var(--f2);font-weight:500}

input[type=text],input[type=number],select{
  font-family:'Inter',sans-serif;font-size:var(--body);font-weight:400;
  background:transparent;border:none;border-bottom:1px solid rgba(36,77,42,0.15);
  padding:0.12rem 0;width:100%;color:var(--on-light-primary);outline:none;transition:border-color 0.2s;
}
input[type=text]:focus,input[type=number]:focus,select:focus{border-color:var(--g2)}
select{cursor:pointer}

.btn-add{
  font-family:'Inter',sans-serif;font-size:0.6rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;
  background:none;border:1.5px dashed rgba(58,122,58,0.5);
  color:var(--on-light-secondary);  /* #2d472d — 9.8:1 on white */
  padding:0.38rem 0.95rem;border-radius:var(--r-sm);cursor:pointer;transition:all 0.2s;
  margin:0.5rem 1rem 0.7rem;display:inline-block;
}
.btn-add:hover{background:var(--sage);color:#fff;border-color:var(--sage)}
.del-btn{font-size:0.75rem;color:#c44;background:rgba(200,50,50,0.07);border:1px solid rgba(200,50,50,0.2);border-radius:6px;cursor:pointer;opacity:0.75;padding:0.2rem 0.5rem;transition:all 0.15s;font-weight:600}
.del-btn:hover{opacity:1;color:#fff;background:#c33;border-color:#c33}

/* ══════════════════════════
   EQUITY PAGE
══════════════════════════ */
.eq-hero{
  background:var(--f1);border-radius:var(--r-xl);
  padding:1.5rem 1.5rem 1.3rem;margin-bottom:1.1rem;
  position:relative;overflow:hidden;box-shadow:var(--sh-lg);
}
.eq-hero::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 75% 55% at 110% 0%,rgba(196,154,32,0.15) 0%,transparent 55%),
    radial-gradient(ellipse 50% 75% at -5% 105%,rgba(45,100,50,0.2) 0%,transparent 55%);
}
/* FIXED: was opacity:0.5 on muted color = invisible */
.eq-tag{font-size:0.62rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--on-dark-secondary);margin-bottom:0.4rem}
.eq-big{font-family:'Playfair Display',serif;font-size:2.3rem;font-weight:400;color:var(--on-dark-primary);line-height:1;margin-bottom:1rem}
.eq-divider{height:0.5px;background:rgba(255,255,255,0.12);margin-bottom:1rem}
.eq-fields{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem}
/* FIXED: was rgba(184,212,180,0.45) — 3.2:1, too low */
.eq-field label{font-size:0.62rem;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;color:var(--on-dark-secondary);display:block;margin-bottom:0.32rem}
.eq-in{
  font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:400;
  color:var(--on-dark-primary);
  width:100%;border:none;border-bottom:1px solid rgba(255,255,255,0.2);
  background:transparent;outline:none;padding:0.12rem 0;
}
.eq-in:focus{border-color:var(--g3)}

.eq-curr-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.7rem;margin-bottom:1.3rem}
.eq-c{background:var(--surface);border-radius:var(--r-md);padding:0.9rem 1rem;box-shadow:var(--sh-sm);border:0.5px solid var(--border-light)}
/* FIXED: was 0.47rem */
.ec-l{font-size:0.62rem;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;color:var(--on-light-muted);margin-bottom:0.25rem}
.ec-v{font-family:'Playfair Display',serif;font-size:1rem;color:var(--on-light-primary);line-height:1.1}

.eq-detail-lbl{font-size:0.62rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--on-light-muted);margin-bottom:0.85rem}

/* ══════════════════════════
   REAL ESTATE
══════════════════════════ */
.re-card{background:var(--surface);border-radius:var(--r-md);box-shadow:var(--sh-sm);border:0.5px solid var(--border-light);overflow:hidden;margin-bottom:0.8rem}
.re-head{
  background:linear-gradient(135deg,var(--f1) 0%,var(--f3) 100%);
  padding:1rem 1.2rem;display:flex;align-items:center;justify-content:space-between;
}
.re-name-in{
  font-family:'Playfair Display',serif;font-size:1rem;font-weight:400;
  color:var(--on-dark-primary);     /* white on dark green — 13:1 */
  background:transparent;border:none;outline:none;
  border-bottom:1px solid rgba(255,255,255,0.25);width:200px;
}
.re-name-in:focus{border-color:var(--g3)}
.re-body{padding:1rem 1.2rem 0.7rem}
.re-fields{display:grid;grid-template-columns:1fr 1fr;gap:0.85rem;margin-bottom:0.85rem}
/* FIXED: was 0.47rem */
.re-fld label{font-size:0.62rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--on-light-muted);display:block;margin-bottom:0.28rem}
.re-computed{display:grid;grid-template-columns:1fr 1fr 1fr;border-top:0.5px solid rgba(36,77,42,0.12)}
.rci{padding:0.75rem 1.2rem}
.rci+.rci{border-left:0.5px solid rgba(36,77,42,0.12)}
/* FIXED: was 0.45rem */
.rc-lbl{font-size:0.6rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--on-light-muted);margin-bottom:0.2rem}
.rc-val{font-family:'Playfair Display',serif;font-size:0.9rem;color:var(--on-light-secondary)}

/* ══════════════════════════
   CHIPS (Cash / RE summary)
══════════════════════════ */
.chips-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.7rem;margin-bottom:1.3rem}
.chip{background:var(--surface);border-radius:var(--r-md);padding:1rem 1.1rem;box-shadow:var(--sh-sm);border:0.5px solid var(--border-light)}
/* FIXED: chip-primary had muted text on dark bg */
.chip-primary{background:var(--f2);border-color:transparent;box-shadow:var(--sh-md)}
/* FIXED: was --muted at opacity — now on-light-muted */
.ch-l{font-size:0.62rem;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;color:var(--on-light-muted);margin-bottom:0.3rem}
.chip-primary .ch-l{color:var(--on-dark-secondary)}   /* 7.2:1 on f2 */
.ch-v{font-family:'Playfair Display',serif;font-size:1.25rem;color:var(--on-light-primary);line-height:1.1}
.chip-primary .ch-v{color:var(--on-dark-primary);font-size:1.5rem}  /* white on dark — 13:1 */

/* ══════════════════════════
   TAB BAR
══════════════════════════ */
.tab-bar{
  flex-shrink:0;background:var(--surface);
  border-top:0.5px solid rgba(36,77,42,0.13);
  display:flex;align-items:stretch;
  padding:0.08rem 0 0.25rem;
  box-shadow:0 -2px 16px rgba(10,22,10,0.07);
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:0.5rem 0.2rem 0.38rem;gap:0.2rem;
  cursor:pointer;border:none;background:none;
  /* FIXED: was --faint (#b0c4ae) at small size — darkened */
  color:var(--on-light-faint);      /* 4.6:1 on white */
  transition:color 0.2s;position:relative;
}
.tab.active{color:var(--f2)}        /* 12.5:1 on white */
.tab-pip{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:22px;height:2.5px;border-radius:0 0 3px 3px;
  background:linear-gradient(90deg,var(--g2),var(--g3));
  opacity:0;transition:opacity 0.2s;
}
.tab.active .tab-pip{opacity:1}
.tab-icon{font-size:1rem;line-height:1}
/* FIXED: was 0.43rem — unreadable. Now 0.55rem */
.tab-lbl{font-size:0.46rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase}
.tab-val{
  font-family:'Playfair Display',serif;font-size:0.6rem;
  color:var(--g2);opacity:0;transition:opacity 0.2s;line-height:1;min-height:0.68rem;
}
.tab.active .tab-val{opacity:1}

/* ══════════════════════════
   TOAST
══════════════════════════ */
.toast{
  position:fixed;top:12px;left:50%;transform:translateX(-50%) translateY(-8px);
  background:var(--f1);
  color:var(--on-dark-secondary);   /* readable on dark */
  font-size:0.62rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
  padding:0.5rem 1.3rem;border-radius:var(--r-pill);
  border:1px solid rgba(196,154,32,0.3);box-shadow:var(--sh-md);
  opacity:0;transition:opacity 0.25s,transform 0.25s;pointer-events:none;z-index:999;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-inner">
    <div class="hdr-top">

        <div class="brand-name">Net Worth <em>Dashboard</em></div>

<div class="scroll">

    <div class="row-total">

  <!-- LUXURY -->

</div>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab active" id="tab-overview" onclick="goPage('overview')">
    <div class="tab-pip"></div>
    <span class="tab-icon">◈</span>
    <span class="tab-lbl">Overview</span>
    <span class="tab-val" id="tv-total"></span>
  </button>
  <button class="tab" id="tab-gold" onclick="goPage('gold')">
    <div class="tab-pip"></div>
    <span class="tab-icon">◉</span>
    <span class="tab-lbl">Gold</span>
    <span class="tab-val" id="tv-gold"></span>
  </button>
  <button class="tab" id="tab-cash" onclick="goPage('cash')">
    <div class="tab-pip"></div>
    <span class="tab-icon">◆</span>
    <span class="tab-lbl">Cash</span>
    <span class="tab-val" id="tv-cash"></span>
  </button>

    <div class="tab-pip"></div>
    <span class="tab-icon">⬡</span>

    <span class="tab-icon">◎</span>
    <span class="tab-lbl">Luxury</span>
    <span class="tab-val" id="tv-luxury"></span>
  </button>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
var DEFAULTS={
  curr:'USD',
  rates:{EUR:0.8718,AED:3.6718},
  goldPx:4591.2,
  gold:[{name:'Krugerrand 1 oz',qty:3,oz:1}],
  cash:[{bank:'Cash',amount:800000,curr:'USD'},{bank:'Company Shareholders Account',amount:3850000,curr:'EUR'}],
  equity:{pct:38,val:49000000},
  re:[{name:'ABC',loc:'Dubai',mktVal:1300000,curr:'USD',paid:300000,liability:1000000}],
  luxury:[]
};

/* ── PERSISTENCE ── */
function saveData(){
  try{
    var toSave={
      curr:S.curr,
      gold:S.gold,
      cash:S.cash,
      equity:S.equity,
      re:S.re,
      luxury:S.luxury
    };
    localStorage.setItem('nw_data',JSON.stringify(toSave));
  }catch(e){}
}

function loadData(){
  try{
    var raw=localStorage.getItem('nw_data');
    if(!raw) return DEFAULTS;
    var saved=JSON.parse(raw);
    /* Merge saved with defaults so new fields are always present */
    return {
      curr: saved.curr || DEFAULTS.curr,
      rates: DEFAULTS.rates,
      goldPx: DEFAULTS.goldPx,
      gold: (saved.gold && saved.gold.length) ? saved.gold : DEFAULTS.gold,
      cash: (saved.cash && saved.cash.length) ? saved.cash : DEFAULTS.cash,
      equity: saved.equity || DEFAULTS.equity,
      re: (saved.re && saved.re.length) ? saved.re : DEFAULTS.re,
      luxury: saved.luxury || DEFAULTS.luxury
    };
  }catch(e){ return DEFAULTS; }
}

var S=loadData();
var COLORS=['#1b3822','#c49a20','#3a7a3a','#a07010','#7c4a8a'];
var donutChart=null,eqDonut=null;

function goPage(id){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.getElementById('page-'+id).classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
  document.querySelector('.scroll').scrollTop=0;
  recalcAll();
}
function setCurr(c){
  S.curr=c;
  document.querySelectorAll('.curr-pill').forEach(function(b){b.classList.toggle('active',b.textContent.trim()===c);});
  recalcAll(); /* recalcAll already calls saveData */
}

/* ── safe rate accessors with fallback ── */
function rateEUR(){ return (S.rates && S.rates.EUR && !isNaN(S.rates.EUR)) ? S.rates.EUR : 0.8718; }
function rateAED(){ return (S.rates && S.rates.AED && !isNaN(S.rates.AED)) ? S.rates.AED : 3.6718; }

function sym(c){ return c==='EUR' ? '€' : c==='AED' ? 'AED ' : '$'; }

function toUSD(n,c){
  if(isNaN(n)||n===null||n===undefined) return 0;
  if(c==='EUR') return n / rateEUR();
  if(c==='AED') return n / rateAED();
  return n;
}
function fromUSD(n,c){
  if(isNaN(n)||n===null||n===undefined) return 0;
  if(c==='EUR') return n * rateEUR();
  if(c==='AED') return n * rateAED();
  return n;
}
function fmt(usd,c){
  c=c||S.curr;
  var v=fromUSD(usd,c);
  if(isNaN(v)) return sym(c)+'—';
  return sym(c)+Math.round(v).toLocaleString('en-US');
}
function fmtS(usd){
  var v=fromUSD(usd,S.curr);
  if(isNaN(v)) return sym(S.curr)+'—';
  var a=Math.abs(v);
  if(a>=1e6) return sym(S.curr)+(v/1e6).toFixed(2)+'M';
  if(a>=1e3) return sym(S.curr)+(v/1e3).toFixed(1)+'K';
  return sym(S.curr)+Math.round(v).toLocaleString();
}
function fmtN(n,c){
  if(isNaN(n)||n===null||n===undefined) return sym(c)+'—';
  return sym(c)+Math.round(n).toLocaleString('en-US');
}
function showToast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2400);
}

function fetchRates(){
  var lbl=document.getElementById('fx-lbl');lbl.textContent='⟳ Fetching…';
  Promise.allSettled([
    fetch('https://api.frankfurter.app/latest?from=USD&to=EUR,AED'),
    fetch('https://api.metals.live/v1/spot/gold')
  ]).then(function(res){
    var pending=0;
    function done(){
      var now=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      lbl.textContent='✓ '+now;
      document.getElementById('r-eur').textContent=S.rates.EUR.toFixed(4);
      document.getElementById('r-aed').textContent=S.rates.AED.toFixed(4);
      document.getElementById('r-gold').textContent='\$'+Math.round(S.goldPx).toLocaleString();
      recalcAll();showToast('Rates refreshed · '+now);
    }
    if(res[0].status==='fulfilled'&&res[0].value.ok){
      pending++;
      res[0].value.json().then(function(d){
        var eur=parseFloat(d.rates.EUR);
        var aed=parseFloat(d.rates.AED);
        if(!isNaN(eur)) S.rates.EUR=eur;
        if(!isNaN(aed)) S.rates.AED=aed;
        if(--pending===0)done();
      }).catch(function(){if(--pending===0)done();});
    }
    if(res[1].status==='fulfilled'&&res[1].value.ok){
      pending++;
      res[1].value.json().then(function(g){
        if(Array.isArray(g)&&g[0]&&g[0].price&&!isNaN(g[0].price)) S.goldPx=parseFloat(g[0].price);
        if(--pending===0)done();
      }).catch(function(){if(--pending===0)done();});
    } else {
      pending++;
      fetch('https://api.coinbase.com/v2/prices/XAU-USD/spot')
        .then(function(r){return r.json();})
        .then(function(d){
          var p=parseFloat(d.data.amount);
          if(!isNaN(p)) S.goldPx=p;
          if(--pending===0)done();
        })
        .catch(function(){if(--pending===0)done();});
    }
    if(pending===0)done();
  }).catch(function(){lbl.textContent='⟳ Refresh';});
}

function renderGold(goldUSD){
  var totOz=S.gold.reduce(function(s,r){return s+r.qty*r.oz;},0);
  document.getElementById('gold-stats').innerHTML=[
    {l:'Total Ounces',v:totOz.toFixed(3)+' oz'},
    {l:'Price / oz',v:'\$'+Math.round(S.goldPx).toLocaleString()},
    {l:'Value ('+S.curr+')',v:fmt(goldUSD)}
  ].map(function(s){return '<div class="stat-pill"><div class="sp-lbl">'+s.l+'</div><div class="sp-val">'+s.v+'</div></div>';}).join('');
  var list=document.getElementById('gold-body');list.innerHTML='';
  if(S.gold.length===0){
    list.innerHTML='<div class="row-empty">No holdings yet — tap + Add Holding</div>';
  }
  S.gold.forEach(function(r,i){
    var oz=r.qty*r.oz,usd=oz*S.goldPx;
    var div=document.createElement('div');div.className='asset-row';
    div.innerHTML=
      '<div class="ar-main">'+
        '<div class="ar-field ar-name">'+
          '<div class="ar-lbl">Coin / Bar</div>'+
          '<input type="text" class="ar-in" placeholder="e.g. Krugerrand" value="'+r.name+'" onchange="S.gold['+i+'].name=this.value;saveData()"/>'+
        '</div>'+
        '<div class="ar-field ar-qty">'+
          '<div class="ar-lbl">Qty</div>'+
          '<input type="number" class="ar-in" value="'+r.qty+'" min="0" step="1" onchange="S.gold['+i+'].qty=+this.value;recalcAll()"/>'+
        '</div>'+
        '<div class="ar-field ar-oz">'+
          '<div class="ar-lbl">Oz/Unit</div>'+
          '<input type="number" class="ar-in" value="'+r.oz+'" min="0" step="0.001" onchange="S.gold['+i+'].oz=+this.value;recalcAll()"/>'+
        '</div>'+
      '</div>'+
      '<div class="ar-footer">'+
        '<span class="ar-calc">'+oz.toFixed(3)+' oz &nbsp;·&nbsp; '+fmt(usd)+'</span>'+
        '<button class="ar-del" onclick="delGold('+i+')">🗑 Remove</button>'+
      '</div>';
    list.appendChild(div);
  });
  document.getElementById('gt-oz').textContent=totOz.toFixed(3)+' oz';
  document.getElementById('gt-val').textContent=fmt(goldUSD);
}
function addGoldRow(){S.gold.push({name:'',qty:0,oz:1});recalcAll();}

function renderCash(cashUSD){
  document.getElementById('cash-chips').innerHTML=
    '<div class="chip chip-primary"><div class="ch-l">Total ('+S.curr+')</div><div class="ch-v">'+fmtS(cashUSD)+'</div></div>'+
    '<div class="chip"><div class="ch-l">Accounts</div><div class="ch-v">'+S.cash.length+'</div></div>'+
    '<div class="chip"><div class="ch-l">In EUR</div><div class="ch-v">€'+Math.round(fromUSD(cashUSD,'EUR')).toLocaleString()+'</div></div>'+
    '<div class="chip"><div class="ch-l">In AED</div><div class="ch-v">'+Math.round(fromUSD(cashUSD,'AED')/1000).toLocaleString()+'K AED</div></div>';
  var list=document.getElementById('cash-body');list.innerHTML='';
  if(S.cash.length===0){
    list.innerHTML='<div class="row-empty">No accounts yet — tap + Add Account</div>';
  }
  S.cash.forEach(function(r,i){
    var usd=toUSD(r.amount,r.curr);
    var div=document.createElement('div');div.className='asset-row';
    div.innerHTML=
      '<div class="ar-main">'+
        '<div class="ar-field ar-name">'+
          '<div class="ar-lbl">Bank / Account</div>'+
          '<input type="text" class="ar-in" placeholder="Bank name" value="'+r.bank+'" onchange="S.cash['+i+'].bank=this.value;saveData()"/>'+
        '</div>'+
        '<div class="ar-field ar-qty">'+
          '<div class="ar-lbl">Amount</div>'+
          '<input type="number" class="ar-in" value="'+r.amount+'" step="1000" onchange="S.cash['+i+'].amount=+this.value;recalcAll()"/>'+
        '</div>'+
        '<div class="ar-field ar-oz">'+
          '<div class="ar-lbl">Currency</div>'+
          '<select class="ar-in" onchange="S.cash['+i+'].curr=this.value;recalcAll()">'+
            '<option'+(r.curr==='USD'?' selected':'')+'>USD</option>'+
            '<option'+(r.curr==='EUR'?' selected':'')+'>EUR</option>'+
            '<option'+(r.curr==='AED'?' selected':'')+'>AED</option>'+
          '</select>'+
        '</div>'+
      '</div>'+
      '<div class="ar-footer">'+
        '<span class="ar-calc">Value: '+fmt(usd)+'</span>'+
        '<button class="ar-del" onclick="delCash('+i+')">🗑 Remove</button>'+
      '</div>';
    list.appendChild(div);
  });
  document.getElementById('ct-val').textContent=fmt(cashUSD);
}
function addCashRow(){S.cash.push({bank:'',amount:0,curr:'USD'});recalcAll();}

function renderEquity(){
  var pct=parseFloat(document.getElementById('eq-pct').value)||0;
  var val=parseFloat(document.getElementById('eq-val').value)||0;
  S.equity.pct=pct;S.equity.val=val;var stakeUSD=val*pct/100;
  document.getElementById('eq-hero-val').textContent=fmt(stakeUSD);
  document.getElementById('eq-curr-grid').innerHTML=['USD','EUR','AED'].map(function(c){
    return '<div class="eq-c"><div class="ec-l">'+c+'</div><div class="ec-v">'+fmtN(fromUSD(stakeUSD,c),c)+'</div></div>';
  }).join('');
  var ctx=document.getElementById('eq-donut').getContext('2d');
  if(eqDonut)eqDonut.destroy();
  eqDonut=new Chart(ctx,{type:'doughnut',data:{labels:['My Stake','Remaining'],datasets:[{data:[stakeUSD,val-stakeUSD],backgroundColor:['#244d2a','#c8e0c8'],borderWidth:1.5,borderColor:'#edf0ea',hoverOffset:5}]},options:{responsive:true,maintainAspectRatio:false,cutout:'70%',plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return ' '+c.label+': '+(c.dataIndex===0?pct:(100-pct)).toFixed(1)+'%';}}}}}});
  document.getElementById('eq-detail').innerHTML=
    '<div class="eq-detail-lbl">Stake Summary</div>'+
    '<div style="margin-bottom:0.8rem">'+
      '<div style="font-size:0.62rem;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;color:var(--on-light-muted);margin-bottom:0.22rem">'+S.curr+'</div>'+
      '<div style="font-family:\'Playfair Display\',serif;font-size:1.6rem;color:var(--on-light-primary)">'+fmt(stakeUSD)+'</div>'+
    '</div>'+
    '<div class="leg">'+['USD','EUR','AED'].map(function(c){
      return '<div class="leg-row"><span class="leg-name">'+c+'</span><span class="leg-val">'+fmtN(fromUSD(stakeUSD,c),c)+'</span></div>';
    }).join('')+'</div>'+
    '<div style="margin-top:0.8rem;font-size:0.62rem;font-weight:500;color:var(--on-light-faint)">'+pct+'% of '+fmtN(val,'USD')+'</div>';
  return stakeUSD;
}

function renderRE(){
  var totGAV=0,totNEV=0,totLiab=0;
  S.re.forEach(function(r){totGAV+=toUSD(r.mktVal,r.curr);totNEV+=toUSD(r.paid,r.curr);totLiab+=toUSD(r.liability,r.curr);});
  document.getElementById('re-summary').innerHTML=
    '<div class="chip chip-primary"><div class="ch-l">GAV ('+S.curr+')</div><div class="ch-v">'+fmtS(totGAV)+'</div></div>'+
    '<div class="chip"><div class="ch-l">Net Equity ('+S.curr+')</div><div class="ch-v">'+fmt(totNEV)+'</div></div>'+
    '<div class="chip"><div class="ch-l">Properties</div><div class="ch-v">'+S.re.length+'</div></div>'+
    '<div class="chip"><div class="ch-l">Liabilities ('+S.curr+')</div><div class="ch-v">'+fmt(totLiab)+'</div></div>';
  var wrap=document.getElementById('re-wrap');wrap.innerHTML='';
  S.re.forEach(function(r,i){
    var gavUSD=toUSD(r.mktVal,r.curr),nevUSD=toUSD(r.paid,r.curr),liabUSD=toUSD(r.liability,r.curr);
    var div=document.createElement('div');div.className='re-card';
    div.innerHTML=
      '<div class="re-head">'+
        '<input class="re-name-in" type="text" value="'+r.name+'" placeholder="Property name" onchange="S.re['+i+'].name=this.value"/>'+
        '<button class="del-btn" style="opacity:0.65;color:rgba(205,228,205,0.9);font-size:0.75rem;padding:0.2rem 0.5rem" onclick="delRE('+i+')">✕ Remove</button>'+
      '</div>'+
      '<div class="re-body">'+
        '<div class="re-fields">'+
          '<div class="re-fld"><label>Market Value ('+r.curr+')</label><input type="number" value="'+r.mktVal+'" step="10000" onchange="S.re['+i+'].mktVal=+this.value;recalcAll()"/></div>'+
          '<div class="re-fld"><label>Currency</label><select onchange="S.re['+i+'].curr=this.value;recalcAll()">'+
            '<option'+(r.curr==='USD'?' selected':'')+'>USD</option>'+
            '<option'+(r.curr==='EUR'?' selected':'')+'>EUR</option>'+
            '<option'+(r.curr==='AED'?' selected':'')+'>AED</option>'+
          '</select></div>'+
          '<div class="re-fld"><label>Equity Invested ('+r.curr+')</label><input type="number" value="'+r.paid+'" step="10000" onchange="S.re['+i+'].paid=+this.value;recalcAll()"/></div>'+
          '<div class="re-fld"><label>Liability ('+r.curr+')</label><input type="number" value="'+r.liability+'" step="10000" onchange="S.re['+i+'].liability=+this.value;recalcAll()"/></div>'+
        '</div>'+
      '</div>'+
      '<div class="re-computed">'+
        '<div class="rci"><div class="rc-lbl">GAV ('+S.curr+')</div><div class="rc-val">'+fmt(gavUSD)+'</div></div>'+
        '<div class="rci"><div class="rc-lbl">Net Equity ('+S.curr+')</div><div class="rc-val">'+fmt(nevUSD)+'</div></div>'+
        '<div class="rci"><div class="rc-lbl">Liability ('+S.curr+')</div><div class="rc-val">'+fmt(liabUSD)+'</div></div>'+
      '</div>';
    wrap.appendChild(div);
  });
  return {totGAV:totGAV,totNEV:totNEV};
}
function addRERow(){S.re.push({name:'New Property',loc:'',mktVal:0,curr:'USD',paid:0,liability:0});recalcAll();}

function delGold(i){
  S.gold.splice(i,1);
  saveData();
  recalcAll();
}
function delCash(i){
  S.cash.splice(i,1);
  saveData();
  recalcAll();
}
function delRE(i){
  S.re.splice(i,1);
  saveData();
  recalcAll();
}
function delLuxury(i){
  S.luxury.splice(i,1);
  saveData();
  recalcAll();
}

function addLuxuryRow(){
  S.luxury.push({name:'',brand:'',curr:'USD',value:0,notes:''});
  recalcAll();
}

function renderLuxury(){
  var luxuryUSD=S.luxury.reduce(function(s,r){return s+toUSD(r.value,r.curr);},0);
  var count=S.luxury.length;

  document.getElementById('luxury-summary').innerHTML=
    '<div class="chip chip-primary"><div class="ch-l">Total ('+S.curr+')</div><div class="ch-v">'+fmtS(luxuryUSD)+'</div></div>'+
    '<div class="chip"><div class="ch-l">Items</div><div class="ch-v">'+count+'</div></div>'+
    '<div class="chip"><div class="ch-l">In EUR</div><div class="ch-v">€'+Math.round(fromUSD(luxuryUSD,'EUR')).toLocaleString()+'</div></div>'+
    '<div class="chip"><div class="ch-l">In AED</div><div class="ch-v">'+Math.round(fromUSD(luxuryUSD,'AED')/1000).toLocaleString()+'K AED</div></div>';

  var list=document.getElementById('luxury-body');list.innerHTML='';
  if(S.luxury.length===0){
    list.innerHTML='<div class="row-empty">No items yet — tap + Add Item below</div>';
  }
  S.luxury.forEach(function(r,i){
    var usd=toUSD(r.value,r.curr);
    var div=document.createElement('div');div.className='asset-row';
    div.innerHTML=
      '<div class="ar-main" style="grid-template-columns:2fr 1fr 1fr">'+
        '<div class="ar-field">'+
          '<div class="ar-lbl">Item Name</div>'+
          '<input type="text" class="ar-in" placeholder="e.g. Rolex Submariner" value="'+r.name+'" onchange="S.luxury['+i+'].name=this.value;saveData()"/>'+
        '</div>'+
        '<div class="ar-field">'+
          '<div class="ar-lbl">Brand</div>'+
          '<input type="text" class="ar-in" placeholder="e.g. Rolex" value="'+r.brand+'" onchange="S.luxury['+i+'].brand=this.value;saveData()"/>'+
        '</div>'+
        '<div class="ar-field">'+
          '<div class="ar-lbl">Category</div>'+
          '<select class="ar-in" onchange="S.luxury['+i+'].notes=this.value;saveData()">'+
            '<option'+(r.notes==='Watch'?' selected':'')+'>Watch</option>'+
            '<option'+(r.notes==='Jewellery'?' selected':'')+'>Jewellery</option>'+
            '<option'+(r.notes==='Handbag'?' selected':'')+'>Handbag</option>'+
            '<option'+(r.notes==='Art'?' selected':'')+'>Art</option>'+
            '<option'+(r.notes==='Car'?' selected':'')+'>Car</option>'+
            '<option'+(r.notes==='Other'?' selected':'')+'>Other</option>'+
          '</select>'+
        '</div>'+
      '</div>'+
      '<div class="ar-main" style="grid-template-columns:2fr 1fr;border-top:0.5px solid var(--border-light)">'+
        '<div class="ar-field">'+
          '<div class="ar-lbl">Value</div>'+
          '<input type="number" class="ar-in" placeholder="0" value="'+r.value+'" step="100" onchange="S.luxury['+i+'].value=+this.value;recalcAll()"/>'+
        '</div>'+
        '<div class="ar-field">'+
          '<div class="ar-lbl">Currency</div>'+
          '<select class="ar-in" onchange="S.luxury['+i+'].curr=this.value;recalcAll()">'+
            '<option'+(r.curr==='USD'?' selected':'')+'>USD</option>'+
            '<option'+(r.curr==='EUR'?' selected':'')+'>EUR</option>'+
            '<option'+(r.curr==='AED'?' selected':'')+'>AED</option>'+
          '</select>'+
        '</div>'+
      '</div>'+
      '<div class="ar-footer">'+
        '<span class="ar-calc">'+fmt(usd)+' &nbsp;·&nbsp; €'+Math.round(fromUSD(usd,'EUR')).toLocaleString()+' &nbsp;·&nbsp; AED '+Math.round(fromUSD(usd,'AED')).toLocaleString()+'</span>'+
        '<button class="ar-del" onclick="delLuxury('+i+')">🗑 Remove</button>'+
      '</div>';
    list.appendChild(div);
  });

  document.getElementById('lt-val').textContent=fmt(luxuryUSD);
  return luxuryUSD;
}

function recalcAll(){
  var goldOz=S.gold.reduce(function(s,r){return s+r.qty*r.oz;},0);
  var goldUSD=goldOz*S.goldPx;
  var cashUSD=S.cash.reduce(function(s,r){return s+toUSD(r.amount,r.curr);},0);
  var stakeUSD=renderEquity();
  var re=renderRE();
  var luxuryUSD=renderLuxury();
  renderGold(goldUSD);renderCash(cashUSD);
  var totalUSD=goldUSD+cashUSD+stakeUSD+re.totNEV+luxuryUSD;

  document.getElementById('nw-display').textContent=fmt(totalUSD);
  document.getElementById('nw-sub').innerHTML=
    ['USD','EUR','AED'].filter(function(c){return c!==S.curr;}).map(function(c){
      return '<span class="nw-s">'+fmtN(fromUSD(totalUSD,c),c)+'</span>';
    }).join('');

  var cats=[
    {l:'Gold',usd:goldUSD,sub:goldOz.toFixed(2)+' oz',pg:'gold',ac:'ac-gold'},
    {l:'Cash',usd:cashUSD,sub:S.cash.length+' accounts',pg:'cash',ac:'ac-green'},
    {l:'Equity',usd:stakeUSD,sub:S.equity.pct+'% stake',pg:'equity',ac:'ac-teal'},
    {l:'Real Estate',usd:re.totNEV,sub:'GAV '+fmtS(re.totGAV),pg:'realestate',ac:'ac-amber'},
    {l:'Luxury',usd:luxuryUSD,sub:S.luxury.length+' items',pg:'luxury',ac:'ac-purple'}
  ];
  document.getElementById('ov-cards').innerHTML=cats.map(function(c){
    var pct=totalUSD>0?c.usd/totalUSD*100:0;
    return '<div class="asset-card '+c.ac+'" onclick="goPage(\''+c.pg+'\')">'+
      '<div class="ac-stripe"></div>'+
      '<div class="ac-lbl">'+c.l+'</div>'+
      '<div class="ac-val">'+fmtS(c.usd)+'</div>'+
      '<div class="ac-sub">'+c.sub+' · '+pct.toFixed(1)+'%</div>'+
      '<div class="ac-bar"><div class="ac-fill" style="width:'+pct+'%"></div></div>'+
    '</div>';
  }).join('');

  var ctx=document.getElementById('donut-chart').getContext('2d');
  if(donutChart)donutChart.destroy();
  donutChart=new Chart(ctx,{type:'doughnut',data:{labels:cats.map(function(c){return c.l;}),datasets:[{data:cats.map(function(c){return c.usd;}),backgroundColor:COLORS,borderWidth:1.5,borderColor:'#edf0ea',hoverOffset:7}]},options:{responsive:true,maintainAspectRatio:false,cutout:'70%',plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return ' '+c.label+': '+fmt(c.raw)+' ('+((c.raw/totalUSD)*100).toFixed(1)+'%)';}}}}}}); 

  document.getElementById('alloc-bar').innerHTML=cats.map(function(c,i){
    var pct=totalUSD>0?c.usd/totalUSD*100:0;
    return '<div class="aseg" style="width:'+pct+'%;background:'+COLORS[i]+'"></div>';
  }).join('');
  document.getElementById('alloc-leg').innerHTML=cats.map(function(c,i){
    var pct=totalUSD>0?c.usd/totalUSD*100:0;
    return '<div class="leg-row">'+
      '<span class="leg-name"><span class="leg-dot" style="background:'+COLORS[i]+'"></span>'+c.l+'</span>'+
      '<span class="leg-val">'+fmtS(c.usd)+' <span style="font-size:0.55rem;color:var(--on-light-faint)">'+pct.toFixed(1)+'%</span></span>'+
    '</div>';
  }).join('');

  document.getElementById('tv-total').textContent=fmtS(totalUSD);
  document.getElementById('tv-gold').textContent=fmtS(goldUSD);
  document.getElementById('tv-cash').textContent=fmtS(cashUSD);
  document.getElementById('tv-equity').textContent=fmtS(stakeUSD);
  document.getElementById('tv-re').textContent=fmtS(re.totNEV);
  document.getElementById('tv-luxury').textContent=fmtS(luxuryUSD);

  /* Save state after every recalc */
  saveData();
}

/* Ensure luxury array exists for older saved data */
if(!S.luxury) S.luxury=[];

/* Restore currency pill UI from saved state */
document.querySelectorAll('.curr-pill').forEach(function(b){
  b.classList.toggle('active', b.textContent.trim()===S.curr);
});

/* Restore equity inputs from saved state */
document.getElementById('eq-pct').value = S.equity.pct;
document.getElementById('eq-val').value = S.equity.val;

recalcAll();
fetchRates();
setInterval(fetchRates,5*60*1000);

/* Show save indicator on first load */
setTimeout(function(){
  showToast('Data restored from last session');
},1200);
</script>
</body>
</html>
